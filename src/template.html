<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    
</head>
<body>
    <header>
        <h1>Weather App</h1>

        <div class="search">
            <div class="list">
            <label for="location-input">Search for a city</label>
        <input type="text" name="" id="location-input" class="location-input" autocomplete="off">
            </div>
        </div>
    <div class="button-header">
        <div class="mode">
            <button class="degree-toggle-btn">
                <span class="degree-toggle">F°</span>
            </button>
        </div>

        <div class="mode">
            <button class="theme-toggle-btn">
            <img class="theme-toggle" src="./light-mode.svg" alt="">
            </button>
            
        </div>
    </div>

    </header>

    <div class="container">
        <p class="start">Enter a city to get started</p>
    </div>
    

</body>
</html>
